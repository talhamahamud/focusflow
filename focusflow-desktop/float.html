<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FocusFlow Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 140px;
      height: 50px;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    #wrap {
      width: 140px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      background: #FCFCFC;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.12);
      gap: 6px;
      animation: pop-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.78) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    #time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #1A120B;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      line-height: 1;
      -webkit-app-region: no-drag;
      cursor: pointer;
      transition: color 0.35s ease;
      flex: 1;
      text-align: center;
    }

    #time.focus-running { color: #4ED99C; }
    #time.break-mode    { color: #FFA02E; }

    .btn-row {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .icon-btn {
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 5px;
      color: rgba(0,0,0,0.4);
      width: 18px;
      height: 18px;
      font-size: 0.52rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: all 0.14s;
      padding: 0;
    }

    .icon-btn:hover {
      background: rgba(0,0,0,0.08);
      color: rgba(0,0,0,0.8);
    }

    .icon-btn.play-btn {
      background: rgba(78, 217, 156, 0.18);
      border-color: rgba(78, 217, 156, 0.3);
      color: #4ED99C;
    }

    .icon-btn.play-btn:hover {
      background: rgba(78, 217, 156, 0.32);
      color: #4ED99C;
    }

    .close-btn {
      background: rgba(0,0,0,0.03);
      border-color: rgba(0,0,0,0.06);
      color: rgba(0,0,0,0.3);
      font-size: 0.55rem;
    }

    .close-btn:hover {
      background: rgba(220, 60, 60, 0.25);
      border-color: rgba(220, 60, 60, 0.4);
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="time">--:--</div>
    <div class="btn-row">
      <button class="icon-btn play-btn" id="play-btn" title="Play / Pause">▶</button>
      <button class="icon-btn" id="reset-btn" title="Reset">↺</button>
      <button class="icon-btn close-btn" id="close-btn" title="Close">✕</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const timeEl    = document.getElementById('time');
    const playBtn   = document.getElementById('play-btn');
    const resetBtn  = document.getElementById('reset-btn');
    const closeBtn  = document.getElementById('close-btn');

    let isRunning = false;
    let currentMode = 'focus';

    ipcRenderer.on('timer-update', (_e, data) => {
      timeEl.textContent = data.timeStr || '--:--';
      isRunning = !!data.running;
      currentMode = data.mode || 'focus';

      timeEl.className = '';
      if (currentMode !== 'focus') {
        timeEl.classList.add('break-mode');
      } else if (isRunning) {
        timeEl.classList.add('focus-running');
      }

      playBtn.innerHTML = isRunning ? '⏸' : '▶';
      playBtn.title = isRunning ? 'Pause' : 'Play';
    });

    playBtn.addEventListener('click', () => {
      ipcRenderer.send('float-action', 'toggle');
    });

    resetBtn.addEventListener('click', () => {
      ipcRenderer.send('float-action', 'reset');
    });

    closeBtn.addEventListener('click', () => {
      ipcRenderer.send('close-float');
    });
  </script>
</body>
</html>
