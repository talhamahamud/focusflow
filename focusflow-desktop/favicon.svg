<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4BB8FA" />
      <stop offset="100%" stop-color="#4ED99C" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="#1A120B" />
  <circle cx="50" cy="50" r="26" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="125 40" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="8" fill="#FFA02E" />
</svg>
