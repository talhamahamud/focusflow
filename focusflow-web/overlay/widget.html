<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FocusFlow Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 120px;
      height: 40px;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    #wrap {
      width: 120px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FCFCFC;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.10);
    }

    #time {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #1A120B;          /* idle: dark text */
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      line-height: 1;
      -webkit-app-region: no-drag;
      cursor: pointer;
      transition: color 0.35s ease;
    }

    /* Running focus session → green */
    #time.state-focus-running { color: #1ba872; }

    /* Any break mode → amber */
    #time.state-break { color: #c97700; }

    /* Disconnected / waiting → muted */
    #time.state-waiting { color: #b0aaa6; }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="time" class="state-waiting">--:--</div>
  </div>

  <script>
    /* ── IPC bridge from Electron main process ─────────────────────────── */
    const { ipcRenderer } = require('electron');
    const timeEl = document.getElementById('time');

    /* Receive timer state forwarded from the web browser via WebSocket */
    ipcRenderer.on('ws-message', (_event, data) => {
      if (data.type !== 'sync') return;

      timeEl.textContent = data.timeStr;

      /* Update colour class */
      timeEl.className = '';
      if (data.mode !== 'focus') {
        timeEl.classList.add('state-break');
      } else if (data.running) {
        timeEl.classList.add('state-focus-running');
      }
      // else: idle focus → default dark, no extra class
    });

    /* Click on the time → toggle play/pause in the web app */
    timeEl.addEventListener('click', () => {
      ipcRenderer.send('send-to-web', { type: 'toggle' });
    });
  </script>
</body>
</html>
